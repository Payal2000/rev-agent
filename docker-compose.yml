version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: revagent-postgres
    environment:
      POSTGRES_DB: revagent
      POSTGRES_USER: revagent
      POSTGRES_PASSWORD: revagent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/data/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U revagent -d revagent"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: revagent-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: revagent-backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://revagent:revagent@postgres:5432/revagent
      - READONLY_DATABASE_URL=postgresql+asyncpg://revagent:revagent@postgres:5432/revagent
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: revagent-celery
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://revagent:revagent@postgres:5432/revagent
      - READONLY_DATABASE_URL=postgresql+asyncpg://revagent:revagent@postgres:5432/revagent
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    volumes:
      - ./backend:/app
    command: celery -A tasks.celery_app worker --loglevel=info -Q agents,scheduled

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: revagent-celery-beat
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://revagent:revagent@postgres:5432/revagent
      - READONLY_DATABASE_URL=postgresql+asyncpg://revagent:revagent@postgres:5432/revagent
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    volumes:
      - ./backend:/app
    command: celery -A tasks.celery_app beat --loglevel=info

volumes:
  pgdata:
